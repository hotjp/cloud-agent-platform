# =============================================================================
# Prometheus Configuration for Cloud Agent Platform
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cloud-agent-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/alerts.yml"

# Scrape configurations
scrape_configs:
  # Cloud Agent Platform server metrics
  - job_name: 'cloud-agent-platform'
    static_configs:
      - targets: ['server:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'cloud-agent-platform'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
