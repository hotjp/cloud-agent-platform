# Cloud Agent Platform - Helm Values
# Production-ready configuration for Kubernetes deployment

# =============================================================================
# Global Settings
# =============================================================================
global:
  imageRegistry: docker.io
  imagePullSecrets: []
  storageClass: ""

# =============================================================================
# Server Configuration
# =============================================================================
server:
  # Container image
  image:
    repository: cloud-agent-platform/cap
    tag: "latest"
    pullPolicy: IfNotPresent

  # Replica count
  replicaCount: 2

  # Service configuration
  service:
    type: ClusterIP
    port: 38080
    metricsPort: 9090
    pprofPort: 6060

  # Resource limits and requests
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "1"
      memory: 1Gi

  # Pod scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Health check
  livenessProbe:
    httpGet:
      path: /health
      port: 38080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 38080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Pod disruption budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  # Environment variables (non-sensitive)
  env:
    GOMAXPROCS: "4"
    GOMEMLIMIT: "2GiB"
    TZ: "UTC"

# =============================================================================
# ConfigMap - Application Configuration
# =============================================================================
config:
  # Server configuration
  server:
    port: 38080
    metricsport: 9090
    pprofport: 6060
    readtimeout: "10s"
    writetimeout: "30s"

  # Database (PostgreSQL)
  database:
    maxopen: 25
    maxidle: 10
    maxlifetime: "5m"

  # Redis
  redis:
    db: 0

  # Authz
  authz:
    apikeyheader: "X-API-Key"
    cachettl: "5m"

  # Telemetry
  telemetry:
    servicename: "cloud-agent-platform"
    endpoint: "http://otel-collector:4317"
    samplerate: 0.1

  # Sandbox
  sandbox:
    backend: "docker"
    fallbacktodocker: true

  # MinIO
  minio:
    bucket: "cap-artifacts"
    usessl: false

  # Rate limit
  rateLimit:
    enabled: true
    qps: 100
    burst: 200

  # Plugins
  plugins:
    search:
      enabled: false
      host: "http://search:7700"

# =============================================================================
# Secrets - Sensitive Configuration
# =============================================================================
secrets:
  # Database DSN (required)
  databaseDsn: ""

  # Redis password
  redisPassword: ""

  # JWT Secret (required)
  jwtSecret: ""

  # LLM API Keys
  anthropicApiKey: ""
  zhipuApiKey: ""

  # MinIO credentials
  minioAccessKey: ""
  minioSecretKey: ""

  # Git credentials
  gitHttpsUser: ""
  gitHttpsToken: ""

# =============================================================================
# PostgreSQL (External/In-Cluster)
# =============================================================================
postgresql:
  enabled: false
  # External PostgreSQL configuration when postgresql.enabled is false
  external:
    host: "postgres.database.svc.cluster.local"
    port: 5432
    database: "cloud_agent_platform"
    username: "user"
    # password via secrets.databaseDsn

# =============================================================================
# Redis (External/In-Cluster)
# =============================================================================
redis:
  enabled: false
  # External Redis configuration when redis.enabled is false
  external:
    host: "redis.cache.svc.cluster.local"
    port: 6379
    # password via secrets.redisPassword

# =============================================================================
# MinIO (External/In-Cluster)
# =============================================================================
minio:
  enabled: false
  # External MinIO configuration when minio.enabled is false
  external:
    endpoint: "minio.storage.svc.cluster.local:9000"
    # accessKey/secretKey via secrets

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
  hosts:
    - host: cap.example.com
      paths:
        - path: /
          pathType: Prefix
          service: server
          port: 38080
  tls:
    - secretName: cap-tls
      hosts:
        - cap.example.com

# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# =============================================================================
# ServiceMonitor for Prometheus
# =============================================================================
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

# =============================================================================
# PodMonitor for Redis
# =============================================================================
podMonitor:
  enabled: false

# =============================================================================
# Grafana Dashboard
# =============================================================================
grafana:
  dashboard:
    enabled: true
    configMap: "cap-grafana-dashboard"

# =============================================================================
# Priority Class
# =============================================================================
priorityClassName: "system-cluster-critical"
