apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cloud-agent-platform.fullname" . }}-config
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    {{- include "cloud-agent-platform.labels" . | nindent 4 }}
data:
  config.yaml: |
    # Cloud Agent Platform Configuration
    # Generated by Helm chart

    server:
      port: {{ .Values.config.server.port }}
      metricsport: {{ .Values.config.server.metricsport }}
      pprofport: {{ .Values.config.server.pprofport }}
      readtimeout: {{ .Values.config.server.readtimeout }}
      writetimeout: {{ .Values.config.server.writetimeout }}

    database:
      maxopen: {{ .Values.config.database.maxopen }}
      maxidle: {{ .Values.config.database.maxidle }}
      maxlifetime: {{ .Values.config.database.maxlifetime }}

    redis:
      db: {{ .Values.config.redis.db }}

    authz:
      apikeyheader: {{ .Values.config.authz.apikeyheader }}
      cachettl: {{ .Values.config.authz.cachettl }}

    telemetry:
      servicename: {{ .Values.config.telemetry.servicename }}
      endpoint: {{ .Values.config.telemetry.endpoint }}
      samplerate: {{ .Values.config.telemetry.samplerate }}

    sandbox:
      backend: {{ .Values.config.sandbox.backend }}
      fallbacktodocker: {{ .Values.config.sandbox.fallbacktodocker }}

    minio:
      bucket: {{ .Values.config.minio.bucket }}
      usessl: {{ .Values.config.minio.usessl }}

    rate_limit:
      enabled: {{ .Values.config.rateLimit.enabled }}
      qps: {{ .Values.config.rateLimit.qps }}
      burst: {{ .Values.config.rateLimit.burst }}

    plugins:
      search:
        enabled: {{ .Values.config.plugins.search.enabled }}
        host: {{ .Values.config.plugins.search.host }}
