{{- if or .Values.secrets.databaseDsn .Values.secrets.jwtSecret (not (empty .Values.secrets.redisPassword)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloud-agent-platform.fullname" . }}-secrets
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    {{- include "cloud-agent-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.databaseDsn }}
  database-dsn: {{ .Values.secrets.databaseDsn | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  {{- end }}
  {{- if .Values.secrets.minioAccessKey }}
  minio-access-key: {{ .Values.secrets.minioAccessKey | quote }}
  {{- end }}
  {{- if .Values.secrets.minioSecretKey }}
  minio-secret-key: {{ .Values.secrets.minioSecretKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.zhipuApiKey }}
  zhipu-api-key: {{ .Values.secrets.zhipuApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.gitHttpsUser }}
  git-https-user: {{ .Values.secrets.gitHttpsUser | quote }}
  {{- end }}
  {{- if .Values.secrets.gitHttpsToken }}
  git-https-token: {{ .Values.secrets.gitHttpsToken | quote }}
  {{- end }}
{{- end }}
