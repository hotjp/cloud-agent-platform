apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloud-agent-platform.fullname" . }}
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    {{- include "cloud-agent-platform.labels" . | nindent 4 }}
  {{- with .Values.server.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.server.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    - port: {{ .Values.server.service.pprofPort }}
      targetPort: pprof
      protocol: TCP
      name: pprof
  selector:
    {{- include "cloud-agent-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
---
{{- if .Values.serviceMonitor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloud-agent-platform.fullname" . }}-monitor
  namespace: {{ .Release.Namespace | default "default" }}
  labels:
    {{- include "cloud-agent-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  annotations:
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.server.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "cloud-agent-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
{{- end }}
