name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -race -count=1 -timeout 5m -p 2 ./...

      - name: Golangci-lint
        uses: golangci-lint/golangci-lint-action@v4
        with:
          version: v1.62.2
          args: --timeout=5m
